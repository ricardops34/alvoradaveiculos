<po-page-default p-title="Configurações de Sistema">
  
  <div class="po-row">
    <po-info class="po-md-12" p-label="Status do Banco de Dados" p-value="A importação de Marcas e Modelos é necessária para o correto funcionamento do cadastro de veículos.">
    </po-info>
  </div>

  <po-divider></po-divider>

  <div class="po-row">
    <div class="po-md-6">
      <po-widget p-title="Identidade Visual">
        <form #formParametros="ngForm">
          <div class="po-row">
            <po-input class="po-md-12" name="empresa_nome" [(ngModel)]="parametros.empresa_nome" p-label="Nome da Empresa" p-required></po-input>
          </div>
          <div class="po-row">
            <po-upload
              class="po-md-6"
              name="logo_file"
              p-label="Logo da Empresa"
              p-url="/api/config/upload"
              (p-success)="onUploadSuccess($event, 'logo_url')">
            </po-upload>
            <po-upload
              class="po-md-6"
              name="favicon_file"
              p-label="Favicon"
              p-url="/api/config/upload"
              (p-success)="onUploadSuccess($event, 'favicon_url')">
            </po-upload>
          </div>
          <div class="po-row">
            <po-upload
              class="po-md-12"
              name="bg_file"
              p-label="Imagem de Fundo"
              p-url="/api/config/upload"
              (p-success)="onUploadSuccess($event, 'background_url')">
            </po-upload>
          </div>
          
          <div class="po-row po-mt-1">
            <div class="po-md-12">
              <p class="po-font-text-smaller">Arquivos atuais: 
                <b>Logo:</b> {{parametros.logo_url}} | 
                <b>Favicon:</b> {{parametros.favicon_url}} | 
                <b>Fundo:</b> {{parametros.background_url}}
              </p>
            </div>
          </div>
          
          <div class="po-row po-mt-2">
            <po-button 
              class="po-md-12"
              p-label="Salvar Alterações" 
              p-kind="primary" 
              p-icon="an an-floppy-disk"
              [p-loading]="loading"
              (p-click)="salvarParametros()">
            </po-button>
          </div>
        </form>
      </po-widget>
    </div>

    <div class="po-md-6">
      <po-widget p-title="Importação de Dados Base">
        <div class="po-row">
          <po-info class="po-md-12" p-label="Registros Atuais" [p-value]="marcasCount + ' Marcas cadastradas'"></po-info>
        </div>
        
        <div class="po-row po-mt-2">
          <po-button 
            class="po-md-12"
            p-label="Importar Marcas e Modelos (CSV)" 
            p-kind="secondary" 
            p-icon="an an-download-simple"
            [p-loading]="loading"
            [p-disabled]="marcasCount > 0"
            (p-click)="importarDados()">
          </po-button>
        </div>

        <p *ngIf="marcasCount > 0" class="po-font-text-smaller po-mt-1" style="color: green;">
          ✅ Os dados já foram importados.
        </p>
        <p *ngIf="marcasCount === 0" class="po-font-text-smaller po-mt-1" style="color: orange;">
          ⚠️ Clique no botão acima para carregar as Marcas e Modelos.
        </p>
      </po-widget>
    </div>
  </div>

</po-page-default>
