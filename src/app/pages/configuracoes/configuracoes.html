<po-page-default p-title="Configurações de Sistema">
  
  <div class="po-row">
    <po-info class="po-md-12" p-label="Status do Banco de Dados" p-value="A importação de Marcas e Modelos é necessária para o correto funcionamento do cadastro de veículos.">
    </po-info>
  </div>

  <po-divider></po-divider>

  <div class="po-row">
    <div class="po-md-6">
      <po-widget p-title="Identidade Visual">
        <form #formParametros="ngForm">
          <div class="po-row">
            <po-input class="po-md-12" name="empresa_nome" [(ngModel)]="parametros.empresa_nome" p-label="Nome da Empresa" 
              p-help="Nome exibido na barra de ferramentas e tela de login. Padrão: BJ Software" p-required>
            </po-input>
          </div>
          <div class="po-row">
            <div class="po-md-6">
              <po-upload
                name="logo_file"
                p-label="Logo da Empresa"
                p-help="Ícone exibido no menu lateral. Formato sugerido: PNG transparente, 200x50px."
                p-url="/api/config/upload"
                (p-success)="onUploadSuccess($event, 'logo_url')">
              </po-upload>
              <div class="preview-container po-mt-1" *ngIf="parametros.logo_url">
                <p class="po-font-text-smaller">Preview Logo:</p>
                <img [src]="'/' + parametros.logo_url" class="img-preview-mini">
              </div>
            </div>
            <div class="po-md-6">
              <po-upload
                name="favicon_file"
                p-label="Favicon"
                p-help="Ícone da aba do navegador. Formato sugerido: .ico ou .png de 32x32px."
                p-url="/api/config/upload"
                (p-success)="onUploadSuccess($event, 'favicon_url')">
              </po-upload>
              <div class="preview-container po-mt-1" *ngIf="parametros.favicon_url">
                <p class="po-font-text-smaller">Preview Favicon:</p>
                <img [src]="'/' + parametros.favicon_url" class="img-preview-mini">
              </div>
            </div>
          </div>
          <div class="po-row">
            <div class="po-md-12">
              <po-upload
                name="bg_file"
                p-label="Imagem de Fundo (Login)"
                p-help="Fundo da tela de login. Formato sugerido: JPG/PNG de alta resolução (1920x1080px)."
                p-url="/api/config/upload"
                (p-success)="onUploadSuccess($event, 'background_url')">
              </po-upload>
              <div class="preview-container po-mt-1" *ngIf="parametros.background_url">
                <p class="po-font-text-smaller">Preview Fundo:</p>
                <img [src]="'/' + parametros.background_url" class="img-preview-bg">
              </div>
            </div>
          </div>
          
          <div class="po-row po-mt-1">
            <div class="po-md-12">
              <p class="po-font-text-smaller">Arquivos atuais em uso: 
                <b>Logo:</b> {{parametros.logo_url}} | 
                <b>Favicon:</b> {{parametros.favicon_url}} | 
                <b>Fundo:</b> {{parametros.background_url}}
              </p>
            </div>
          </div>
          
          <div class="po-row po-mt-2">
            <po-button 
              class="po-md-12"
              p-label="Salvar Alterações de Nome" 
              p-kind="primary" 
              p-icon="an an-floppy-disk"
              [p-loading]="loading"
              (p-click)="salvarParametros()">
            </po-button>
          </div>
        </form>
      </po-widget>
    </div>

    <div class="po-md-6">
      <po-widget p-title="Importação e Modelos de Dados">
        <div class="po-row">
          <po-info class="po-md-12" p-label="Registros Atuais" [p-value]="marcasCount + ' Marcas cadastradas'"></po-info>
        </div>
        
        <po-divider p-label="Download de Modelos"></po-divider>
        <div class="po-row">
          <div class="po-md-12">
            <p class="po-font-text-smaller po-mb-1">Baixe os arquivos atuais para usar como base para novas edições:</p>
            <div class="po-row">
              <po-button class="po-md-6" p-label="Marcas (CSV)" p-small p-icon="an an-download" (p-click)="downloadModelo('marcas-carros')"></po-button>
              <po-button class="po-md-6" p-label="Modelos (CSV)" p-small p-icon="an an-download" (p-click)="downloadModelo('modelos-carro')"></po-button>
            </div>
          </div>
        </div>

        <po-divider p-label="Upload de Novos Dados"></po-divider>
        <div class="po-row">
          <po-upload
            class="po-md-12"
            name="file"
            p-label="Enviar novo arquivo de dados"
            p-help="Envie arquivos com o mesmo nome dos modelos (ex: marcas-carros.csv) para substituir os dados base."
            p-url="/api/config/upload-csv"
            (p-success)="onCsvUploadSuccess()">
          </po-upload>
        </div>

        <po-divider p-label="Executar Carga"></po-divider>
        <div class="po-row po-mt-1">
          <po-button 
            class="po-md-12"
            p-label="Processar Importação para o Banco" 
            p-kind="secondary" 
            p-icon="an an-database"
            [p-loading]="loading"
            [p-disabled]="marcasCount > 0"
            (p-click)="importarDados()">
          </po-button>
        </div>

        <p *ngIf="marcasCount > 0" class="po-font-text-smaller po-mt-1" style="color: green;">
          ✅ Os dados já estão carregados no banco de dados.
        </p>
      </po-widget>
    </div>
  </div>

  <div class="po-row po-mt-2">
    <div class="po-md-12">
      <po-widget p-title="Configurações de E-mail (SMTP)">
        <form #formSmtp="ngForm">
          <div class="po-row">
            <po-input class="po-md-4" name="smtp_host" [(ngModel)]="parametros.smtp_host" p-label="Servidor SMTP (Host)" p-placeholder="smtp.exemplo.com"></po-input>
            <po-number class="po-md-2" name="smtp_port" [(ngModel)]="parametros.smtp_port" p-label="Porta" p-placeholder="587"></po-number>
            <po-input class="po-md-6" name="smtp_from" [(ngModel)]="parametros.smtp_from" p-label="E-mail de Origem (From)" p-placeholder="sistema@alvorada.com"></po-input>
          </div>
          <div class="po-row">
            <po-input class="po-md-6" name="smtp_user" [(ngModel)]="parametros.smtp_user" p-label="Usuário SMTP" p-placeholder="usuario@provedor.com"></po-input>
            <po-password class="po-md-6" name="smtp_pass" [(ngModel)]="parametros.smtp_pass" p-label="Senha SMTP" [p-hide-password]="true"></po-password>
          </div>
          
          <div class="po-row po-mt-2">
            <po-button 
              class="po-md-12"
              p-label="Salvar Configurações de E-mail" 
              p-kind="primary" 
              p-icon="an an-floppy-disk"
              [p-loading]="loading"
              (p-click)="salvarParametros()">
            </po-button>
          </div>
        </form>
      </po-widget>
    </div>
  </div>

</po-page-default>
