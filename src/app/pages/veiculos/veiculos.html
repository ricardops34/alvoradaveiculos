<po-page-default p-title="Cadastro de Veículos">
  
  <div class="po-row">
    <po-button 
      class="po-md-2" 
      p-label="Novo" 
      p-type="primary" 
      p-icon="an an-plus"
      (p-click)="openNew()">
    </po-button>
  </div>

  <po-table 
    class="po-mt-2"
    [p-columns]="columns" 
    [p-items]="vehicles" 
    [p-actions]="tableActions">
  </po-table>

</po-page-default>

<!-- Modal de Cadastro/Edição -->
<po-modal #vehicleModal 
  [p-title]="isEditing ? 'Editar Veículo' : 'Novo Veículo'"
  p-size="xl"
  [p-primary-action]="{ label: 'Salvar', action: save.bind(this) }"
  [p-secondary-action]="{ label: 'Cancelar', action: vehicleModal.close.bind(vehicleModal) }">

  <form #vehicleForm="ngForm">
    <div class="po-row">
      <po-combo class="po-md-2" name="tipo_veiculo" [(ngModel)]="vehicle.tipo_veiculo" p-label="Tipo" p-required [p-options]="tipoVeiculoOptions"></po-combo>
      <po-input class="po-md-2" name="placa" [(ngModel)]="vehicle.placa" p-label="Placa" p-required p-maxlength="7" style="text-transform: uppercase;"></po-input>
      
      <div class="po-md-3" style="display: flex; gap: 8px;">
        <po-combo style="flex: 1" name="marca_id" [(ngModel)]="vehicle.marca_id" p-label="Marca" p-required [p-options]="marcasOptions" (p-change)="onMarcaChange($event)"></po-combo>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-icon="po-icon-plus" (p-click)="currentQuickAddField='marca_id'; appQuickAdd.open('marcas')"></po-button>
        </div>
      </div>

      <div class="po-md-3" style="display: flex; gap: 8px;">
        <po-combo style="flex: 1" name="modelo_id" [(ngModel)]="vehicle.modelo_id" p-label="Modelo" p-required [p-options]="modelosOptions" [p-disabled]="!vehicle.marca_id"></po-combo>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-icon="po-icon-plus" (p-click)="currentQuickAddField='modelo_id'; appQuickAdd.open('modelos')" [p-disabled]="!vehicle.marca_id"></po-button>
        </div>
      </div>

      <po-input class="po-md-2" name="cor" [(ngModel)]="vehicle.cor" p-label="Cor"></po-input>
    </div>

    <div class="po-row">
      <po-input class="po-md-3" name="renavam" [(ngModel)]="vehicle.renavam" p-label="Renavam"></po-input>
      <po-input class="po-md-5" name="chassi" [(ngModel)]="vehicle.chassi" p-label="Chassi"></po-input>
      <po-number class="po-md-2" name="ano_fabricacao" [(ngModel)]="vehicle.ano_fabricacao" p-label="Ano Fab."></po-number>
      <po-number class="po-md-2" name="ano_modelo" [(ngModel)]="vehicle.ano_modelo" p-label="Ano Mod."></po-number>
    </div>

    <po-divider p-label="Vínculos e Financeiro"></po-divider>

    <div class="po-row">
      <po-select class="po-md-6" name="fornecedor" [(ngModel)]="vehicle.fornecedor_id" p-label="Fornecedor (Origem)" [p-options]="supplierOptions" p-required></po-select>
      <po-datepicker class="po-md-3" name="data_compra" [(ngModel)]="vehicle.data_compra" p-label="Data Compra"></po-datepicker>
      <po-decimal class="po-md-3" name="valor_compra" [(ngModel)]="vehicle.valor_compra" p-label="Valor de Compra" p-decimals="2" p-required></po-decimal>
    </div>

    <div class="po-row po-mt-2">
      <po-radio-group class="po-md-3" name="forma_compra" [(ngModel)]="vehicle.forma_compra" p-label="Forma de Compra" [p-options]="formaCompraOptions" p-required></po-radio-group>
      <po-select class="po-md-4" name="banco_id" [(ngModel)]="vehicle.banco_id" p-label="Conta Bancária (Saída)" [p-options]="bankOptions" *ngIf="vehicle.forma_compra === 'Banco'" p-required></po-select>
      <po-select class="po-md-5" name="centro_custo_id" [(ngModel)]="vehicle.centro_custo_id" p-label="Centro de Custo (Banco)" [p-options]="costCenterOptions" *ngIf="vehicle.forma_compra === 'Banco'" p-required></po-select>
    </div>

    <div class="po-row">
      <po-info class="po-md-3" p-label="Status Atual" [p-value]="vehicle.status"></po-info>
      <po-decimal class="po-md-3" name="valor_avaliacao" [(ngModel)]="vehicle.valor_avaliacao" p-label="Valor de Avaliação" p-decimals="2"></po-decimal>
    </div>

    <po-divider p-label="Fotos do Veículo"></po-divider>

    <div class="po-row">
      <po-upload
        class="po-md-12"
        name="fotos_upload"
        p-label="Adicionar Fotos"
        [p-hide-send-button]="true"
        [p-multiple]="true"
        (p-on-change)="onUpload($event)">
      </po-upload>
    </div>

    <!-- Galeria de Fotos -->
    <div class="po-row" *ngIf="vehicle.fotos && vehicle.fotos.length > 0">
      <div *ngFor="let foto of vehicle.fotos; let i = index" class="po-md-2 po-mt-1" style="position: relative;">
        <img [src]="foto" style="width: 100%; height: 100px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd;">
        <button 
          class="po-icon po-icon-delete" 
          style="position: absolute; top: 5px; right: 20px; background: rgba(255,0,0,0.7); color: white; border: none; border-radius: 50%; cursor: pointer; padding: 5px;"
          (click)="removeFoto(i)">
        </button>
      </div>
    </div>
  </form>
</po-modal>

<!-- Modal de Extrato do Veículo -->
<po-modal #statementModal 
  p-title="Extrato e Custos do Veículo" 
  p-size="xl"
  [p-primary-action]="{ label: 'Fechar', action: statementModal.close.bind(statementModal) }">

  <div class="po-row">
    <po-info class="po-md-2" p-label="Veículo" [p-value]="vehicle.marca_nome + ' ' + vehicle.modelo_nome"></po-info>
    <po-info class="po-md-2" p-label="Placa" [p-value]="vehicle.placa"></po-info>
    <po-info class="po-md-2" p-label="Avaliação" [p-value]="(vehicle.valor_avaliacao | currency:'BRL') ?? ''"></po-info>
    <po-info class="po-md-2" p-label="Compra" [p-value]="(vehicle.valor_compra | currency:'BRL') ?? ''"></po-info>
    <po-info class="po-md-2" p-label="Venda" [p-value]="((vehicle.valor_venda || 0) | currency:'BRL') ?? ''"></po-info>
    <po-info class="po-md-2" p-label="Resultado" [p-value]="(vehicleSummary.profit | currency:'BRL') ?? ''" 
      [style.color]="vehicleSummary.profit >= 0 ? 'green' : 'red'">
    </po-info>
  </div>

  <po-divider p-label="Movimentações Vinculadas (Manutenções, Comissões, etc.)"></po-divider>

  <po-table 
    [p-columns]="statementColumns" 
    [p-items]="selectedVehicleStatement">
  </po-table>

  <div class="po-row po-mt-2">
    <po-info class="po-md-6" p-label="Total de Despesas Adicionais" [p-value]="(vehicleSummary.totalExpenses | currency:'BRL') ?? ''"></po-info>
    <po-info class="po-md-6" p-label="Total de Receitas Adicionais" [p-value]="(vehicleSummary.totalRevenue | currency:'BRL') ?? ''"></po-info>
  </div>
</po-modal>

<!-- Modal de Venda -->
<po-modal #sellModal 
  p-title="Vender Veículo"
  p-size="xl"
  [p-primary-action]="{ label: 'Confirmar Venda', action: confirmSale.bind(this) }"
  [p-secondary-action]="{ label: 'Cancelar', action: sellModal.close.bind(sellModal) }">

  <form #sellForm="ngForm">
    <div class="po-row">
      <po-info class="po-md-4" p-label="Veículo" [p-value]="vehicle.marca_nome + ' ' + vehicle.modelo_nome + ' (' + vehicle.placa + ')'"></po-info>
      <po-info class="po-md-3" p-label="Valor de Compra" [p-value]="(vehicle.valor_compra | currency:'BRL') ?? ''"></po-info>
      <po-info class="po-md-3" p-label="Avaliação" [p-value]="(vehicle.valor_avaliacao | currency:'BRL') ?? ''"></po-info>
    </div>

    <po-divider p-label="Dados da Venda"></po-divider>

    <div class="po-row">
      <po-select class="po-md-6" name="cliente_venda" [(ngModel)]="sellData.cliente_id" p-label="Cliente (Comprador)" [p-options]="clientOptions" p-required></po-select>
      <po-datepicker class="po-md-3" name="data_venda" [(ngModel)]="sellData.data_venda" p-label="Data da Venda" p-required></po-datepicker>
      <po-decimal class="po-md-3" name="valor_venda" [(ngModel)]="sellData.valor_venda" p-label="Valor da Venda" p-decimals="2" p-required></po-decimal>
    </div>

    <div class="po-row po-mt-2">
      <po-radio-group class="po-md-3" name="forma_venda" [(ngModel)]="sellData.forma_venda" p-label="Forma de Recebimento" [p-options]="formaCompraOptions" p-required></po-radio-group>
      <po-select class="po-md-4" name="banco_venda" [(ngModel)]="sellData.banco_id" p-label="Conta Bancária (Entrada)" [p-options]="bankOptions" *ngIf="sellData.forma_venda === 'Banco'" p-required></po-select>
      <po-select class="po-md-5" name="centro_venda" [(ngModel)]="sellData.centro_custo_id" p-label="Centro de Custo (Receita)" [p-options]="costCenterOptions" *ngIf="sellData.forma_venda === 'Banco'" p-required></po-select>
    </div>

    <div class="po-row po-mt-2" *ngIf="sellData.forma_venda === 'Troca'">
      <po-divider p-label="Dados do Veículo de Entrada (Troca)"></po-divider>
    </div>
    
    <div class="po-row" *ngIf="sellData.forma_venda === 'Troca'">
      <po-input class="po-md-2" name="troca_placa" [(ngModel)]="sellData.troca_placa" p-label="Placa" p-required p-maxlength="7" style="text-transform: uppercase;"></po-input>
      <po-input class="po-md-3" name="troca_marca" [(ngModel)]="sellData.troca_marca" p-label="Marca" p-required></po-input>
      <po-input class="po-md-4" name="troca_modelo" [(ngModel)]="sellData.troca_modelo" p-label="Modelo" p-required></po-input>
      <po-input class="po-md-3" name="troca_cor" [(ngModel)]="sellData.troca_cor" p-label="Cor"></po-input>
    </div>

    <div class="po-row" *ngIf="sellData.forma_venda === 'Troca'">
      <po-number class="po-md-3" name="troca_ano_fab" [(ngModel)]="sellData.troca_ano_fab" p-label="Ano Fabricação"></po-number>
      <po-number class="po-md-3" name="troca_ano_mod" [(ngModel)]="sellData.troca_ano_mod" p-label="Ano Modelo"></po-number>
      <po-decimal class="po-md-6" name="troca_valor" [(ngModel)]="sellData.troca_valor" p-label="Valor de Avaliação na Troca (Compra)" p-decimals="2" p-required></po-decimal>
    </div>
  </form>
</po-modal>
<app-quick-add #appQuickAdd (onAdded)="handleQuickAdd($event, currentQuickAddField)"></app-quick-add>
