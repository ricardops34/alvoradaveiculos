<po-page-list 
  p-title="Cadastro de Veículos" 
  [p-actions]="pageActions"
  [p-filter]="filterSettings"
  [p-disclaimer-group]="disclaimerGroup">

  <po-table 
    class="po-mt-1 po-mb-5"
    p-sort="true"
    [p-columns]="columns"     
    [p-items]="vehicles" 
    [p-actions]="tableActions"
    [p-show-more-disabled]="!hasNext"
    [p-loading-show-more]="loadingShowMore"
    [p-loading]="isLoading"
    (p-show-more)="showMore()">
  </po-table>
</po-page-list>

<!-- Modal de Envio de Documento por E-mail (Proposta/Recibos) -->
<po-modal #emailModal
  p-title="Enviar por E-mail"
  p-size="sm"
  [p-primary-action]="{ label: 'Enviar', action: confirmarEnvioEmail.bind(this), loading: enviandoEmail }"
  [p-secondary-action]="{ label: 'Cancelar', action: emailModal.close.bind(emailModal) }">

  <form #emailForm="ngForm">
    <div class="po-row">
      <po-email class="po-md-12" name="email_destinatario" [(ngModel)]="emailData.destinatario" p-label="Destinatário" p-required></po-email>
    </div>
    <div class="po-row">
      <po-input class="po-md-12" name="email_assunto" [(ngModel)]="emailData.assunto" p-label="Assunto"></po-input>
    </div>
  </form>
</po-modal>

<!-- Modal de Busca Avançada -->
<po-modal #advancedFilterModal 
  p-title="Busca Avançada"
  [p-primary-action]="{ label: 'Aplicar filtros', action: applyFilters.bind(this) }">
  
  <div class="po-row">
    <po-checkbox-group
      class="po-md-12"
      name="tipo_veiculo_filter"
      p-label="Filtrar por Tipo"
      p-columns="2"
      [p-options]="tipoVeiculoOptions"
      [(ngModel)]="advancedFilters.tipo_veiculo">
    </po-checkbox-group>
  </div>
  <div class="po-row po-mt-2">
    <po-checkbox-group
      class="po-md-12"
      name="status_filter"
      p-label="Filtrar por Status"
      p-columns="2"
      [p-options]="statusOptions"
      [(ngModel)]="advancedFilters.status">
    </po-checkbox-group>
  </div>
  <div class="po-row po-mt-2">
    <po-select
      class="po-md-6"
      name="marca_filter"
      p-label="Marca"
      [p-options]="marcasOptions"
      [(ngModel)]="advancedFilters.marca_id"
      (p-change)="updateFilterModelos()">
    </po-select>
    <po-select
      class="po-md-6"
      name="modelo_filter"
      p-label="Modelo"
      [p-options]="filterModelosOptions"
      [p-disabled]="!advancedFilters.marca_id"
      [(ngModel)]="advancedFilters.modelo_id">
    </po-select>
  </div>
  <div class="po-row po-mt-2">
    <po-checkbox-group
      class="po-md-12"
      name="opcionais_filter"
      p-label="Filtrar por Opcionais"
      p-columns="3"
      [p-options]="opcionaisOptions"
      [(ngModel)]="advancedFilters.opcionais">
    </po-checkbox-group>
  </div>
</po-modal>

<!-- Modal de Cadastro/Edição -->
<po-modal #vehicleModal 
  [p-title]="isEditing ? 'Editar Veículo' : 'Novo Veículo'"
  p-size="xl"
  [p-primary-action]="{ label: 'Salvar', action: save.bind(this), loading: isLoadingSave }"
  [p-secondary-action]="{ label: 'Cancelar', action: vehicleModal.close.bind(vehicleModal) }">

  <form #vehicleForm="ngForm">
    <div class="po-row">
      <po-select class="po-md-2" name="tipo_veiculo" [(ngModel)]="vehicle.tipo_veiculo" p-label="Tipo" p-required [p-options]="tipoVeiculoOptions"></po-select>
      
      <div class="po-md-3" style="display: flex; gap: 8px;">
        <po-combo style="flex: 1" name="marca_id" [(ngModel)]="vehicle.marca_id" p-label="Marca" p-required [p-options]="marcasOptions" (p-change)="updateModelos()"></po-combo>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='marca_id'; appQuickAdd.open('marcas')"></po-button>
        </div>
      </div>

      <div class="po-md-3" style="display: flex; gap: 8px;">
        <po-combo style="flex: 1" name="modelo_id" [(ngModel)]="vehicle.modelo_id" p-label="Modelo" p-required [p-options]="modelosOptions" [p-disabled]="!vehicle.marca_id"></po-combo>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='modelo_id'; appQuickAdd.open('modelos')" [p-disabled]="!vehicle.marca_id"></po-button>
        </div>
      </div>

      <po-input class="po-md-2" name="cor" [(ngModel)]="vehicle.cor" p-label="Cor"></po-input>
      <po-input class="po-md-2" name="placa" [(ngModel)]="vehicle.placa" p-label="Placa" p-required p-maxlength="7" style="text-transform: uppercase;"></po-input>
    </div>

    <div class="po-row">
      <po-input class="po-md-3" name="renavam" [(ngModel)]="vehicle.renavam" p-label="Renavam"></po-input>
      <div class="po-md-5" style="display: flex; gap: 8px;">
        <po-input style="flex: 1" name="chassi" [(ngModel)]="vehicle.chassi" p-label="Chassi"></po-input>
        <div *ngIf="!isEditing" style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="secondary" p-icon="an an-magnifying-glass" p-tooltip="Verificar se este veículo já passou pela loja (recompra)" [p-loading]="buscandoHistorico" (p-click)="verificarChassi()"></po-button>
        </div>
      </div>
      <po-number class="po-md-2" name="ano_fabricacao" [(ngModel)]="vehicle.ano_fabricacao" p-label="Ano Fab."></po-number>
      <po-number class="po-md-2" name="ano_modelo" [(ngModel)]="vehicle.ano_modelo" p-label="Ano Mod."></po-number>
    </div>

    <div class="po-row" *ngIf="!isEditing && chassiVerificado === vehicle.chassi && estadiasAnterioresEncontradas > 0">
      <po-info class="po-md-12" p-label="⚠ Recompra detectada" [p-value]="'Este chassi já passou pela loja ' + estadiasAnterioresEncontradas + 'x. Salve o cadastro e use a ação \'Histórico do Veículo\' na listagem para ver os detalhes.'"></po-info>
    </div>

    <po-divider p-label="Vínculos e Financeiro"></po-divider>

    <div class="po-row">
      <div class="po-md-6" style="display: flex; gap: 8px;">
        <po-lookup 
          style="flex: 1" 
          name="fornecedor" 
          [(ngModel)]="vehicle.fornecedor_id" 
          p-label="Fornecedor (Origem)" 
          [p-filter-service]="pessoasLookup" 
          [p-filter-params]="{ is_fornecedor: true }"
          p-field-label="nome"
          p-field-value="id"
          p-required>
        </po-lookup>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='fornecedor_id'; appQuickAdd.open('pessoas')"></po-button>
        </div>
      </div>
      <po-datepicker class="po-md-3" name="data_compra" [(ngModel)]="vehicle.data_compra" p-label="Data Compra"></po-datepicker>
      <po-decimal class="po-md-3" name="valor_compra" [(ngModel)]="vehicle.valor_compra" p-label="Valor de Compra" p-decimals="2" p-required></po-decimal>
    </div>

    <div class="po-row po-mt-2">
      <po-radio-group class="po-md-3" name="forma_compra" [(ngModel)]="vehicle.forma_compra" p-label="Forma de Compra" [p-options]="formaCompraOptions" p-required></po-radio-group>
      
      <div class="po-md-4" *ngIf="vehicle.forma_compra === 'Banco'" style="display: flex; gap: 8px;">
        <po-lookup 
          style="flex: 1" 
          name="banco_id" 
          [(ngModel)]="vehicle.banco_id" 
          p-label="Conta Bancária (Saída)" 
          [p-filter-service]="bancosLookup" 
          p-field-label="nome"
          p-field-value="id"
          p-required>
        </po-lookup>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='banco_id'; appQuickAdd.open('bancos')"></po-button>
        </div>
      </div>

      <div class="po-md-5" *ngIf="vehicle.forma_compra === 'Banco'" style="display: flex; gap: 8px;">
        <po-lookup 
          style="flex: 1" 
          name="centro_custo_id" 
          [(ngModel)]="vehicle.centro_custo_id" 
          p-label="Centro de Custo (Banco)" 
          [p-filter-service]="centrosCustoLookup" 
          [p-filter-params]="{ tipo: 'Saída' }"
          p-field-label="nome"
          p-field-value="id"
          p-required>
        </po-lookup>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='centro_custo_id'; appQuickAdd.open('centros-custo')"></po-button>
        </div>
      </div>
    </div>

    <div class="po-row">
      <po-info class="po-md-3" p-label="Status Atual" [p-value]="vehicle.status"></po-info>
      <po-decimal class="po-md-3" name="valor_avaliacao" [(ngModel)]="vehicle.valor_avaliacao" p-label="Valor de Avaliação" p-decimals="2"></po-decimal>
      <po-decimal class="po-md-3" name="valor_fipe" [(ngModel)]="vehicle.valor_fipe" p-label="Valor FIPE" p-decimals="2"></po-decimal>
    </div>

    <po-divider p-label="Fotos do Veículo"></po-divider>

    <div class="po-row">
      <po-upload
        class="po-md-12"
        name="foto_file"
        p-label="Adicionar Fotos"
        p-help="Envie uma ou mais fotos do veículo (JPG/PNG/WEBP, até 10MB cada)."
        p-url="/api/veiculos/upload-foto"
        [p-headers]="uploadHeaders"
        p-multiple
        [p-restrictions]="fotoRestrictions"
        (p-success)="onFotoUploadSuccess($event)">
      </po-upload>
    </div>

    <div class="po-row po-mt-1" *ngIf="vehicle.fotos && vehicle.fotos.length">
      <div class="po-md-2" *ngFor="let foto of vehicle.fotos; let i = index" style="position: relative; margin-bottom: 12px;">
        <img [src]="foto" style="width: 100%; height: 100px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd;">
        <po-button
          p-icon="po-icon-delete"
          p-kind="danger"
          p-small
          style="position: absolute; top: 2px; right: 2px;"
          (p-click)="removeFoto(i)">
        </po-button>
      </div>
    </div>

    <po-divider p-label="RENAVE — Documento (CRV) e Hodômetro" p-help="Dados exigidos para a integração com o Registro Nacional de Veículos em Estoque."></po-divider>

    <div class="po-row">
      <po-select class="po-md-2" name="tipo_crv" [(ngModel)]="vehicle.tipo_crv" p-label="Tipo do CRV" [p-options]="tipoCrvOptions"></po-select>
      <po-input class="po-md-3" name="numero_crv" [(ngModel)]="vehicle.numero_crv" p-label="Número do CRV"></po-input>
      <po-input class="po-md-3" name="codigo_seguranca_crv" [(ngModel)]="vehicle.codigo_seguranca_crv" p-label="Código de Segurança do CRV"></po-input>
      <po-datepicker class="po-md-2" name="data_medicao_hodometro" [(ngModel)]="vehicle.data_medicao_hodometro" p-label="Data da Aferição do Hodômetro"></po-datepicker>
      <po-input class="po-md-2" name="nota_fiscal_compra_chave" [(ngModel)]="vehicle.nota_fiscal_compra_chave" p-label="Chave da NF-e (Compra)" p-maxlength="44"></po-input>
    </div>

    <po-divider p-label="Opcionais e Observações"></po-divider>

    <div class="po-row">
      <po-multiselect class="po-md-12" name="opcionais" [(ngModel)]="vehicle.opcionais" p-label="Opcionais" [p-options]="opcionaisOptions"></po-multiselect>
    </div>
    <div class="po-row">
      <po-textarea class="po-md-12" name="observacoes" [(ngModel)]="vehicle.observacoes" p-label="Observações"></po-textarea>
    </div>

  </form>
</po-modal>

<!-- Modal de Extrato do Veículo -->
<po-modal #statementModal 
  p-title="Extrato e Custos do Veículo" 
  p-size="xl"
  [p-primary-action]="{ label: 'Fechar', action: statementModal.close.bind(statementModal) }">

  <div class="po-row">
    <po-info class="po-md-2" p-label="Veículo" [p-value]="vehicle.marca_nome + ' ' + vehicle.modelo_nome"></po-info>
    <po-info class="po-md-2" p-label="Placa" [p-value]="vehicle.placa"></po-info>
    <po-info class="po-md-2" p-label="Avaliação" [p-value]="(vehicle.valor_avaliacao | currency:'BRL') ?? ''"></po-info>
    <po-info class="po-md-2" p-label="Compra" [p-value]="(vehicle.valor_compra | currency:'BRL') ?? ''"></po-info>
    <po-info class="po-md-2" p-label="Venda" [p-value]="((vehicle.valor_venda || 0) | currency:'BRL') ?? ''"></po-info>
    <po-info class="po-md-2" p-label="Resultado" [p-value]="(vehicleSummary.profit | currency:'BRL') ?? ''" 
      [style.color]="vehicleSummary.profit >= 0 ? 'green' : 'red'">
    </po-info>
  </div>

  <po-divider p-label="Movimentações Vinculadas (Manutenções, Comissões, etc.)"></po-divider>

  <po-table 
    [p-columns]="statementColumns" 
    [p-items]="selectedVehicleStatement">
  </po-table>

  <div class="po-row po-mt-2">
    <po-info class="po-md-6" p-label="Total de Despesas Adicionais" [p-value]="(vehicleSummary.totalExpenses | currency:'BRL') ?? ''"></po-info>
    <po-info class="po-md-6" p-label="Total de Receitas Adicionais" [p-value]="(vehicleSummary.totalRevenue | currency:'BRL') ?? ''"></po-info>
  </div>
</po-modal>

<!-- Modal de Venda -->
<po-modal #sellModal 
  p-title="Vender Veículo"
  p-size="xl"
  [p-primary-action]="{ label: 'Confirmar Venda', action: confirmSale.bind(this) }"
  [p-secondary-action]="{ label: 'Cancelar', action: sellModal.close.bind(sellModal) }">

  <form #sellForm="ngForm">
    <div class="po-row">
      <po-info class="po-md-4" p-label="Veículo" [p-value]="vehicle.marca_nome + ' ' + vehicle.modelo_nome + ' (' + vehicle.placa + ')'"></po-info>
      <po-info class="po-md-3" p-label="Valor de Compra" [p-value]="(vehicle.valor_compra | currency:'BRL') ?? ''"></po-info>
      <po-info class="po-md-3" p-label="Avaliação" [p-value]="(vehicle.valor_avaliacao | currency:'BRL') ?? ''"></po-info>
    </div>

    <po-divider p-label="Dados da Venda"></po-divider>

    <div class="po-row">
      <div class="po-md-6" style="display: flex; gap: 8px;">
        <po-lookup 
          style="flex: 1" 
          name="cliente_venda" 
          [(ngModel)]="sellData.cliente_id" 
          p-label="Cliente (Comprador)" 
          [p-filter-service]="pessoasLookup" 
          [p-filter-params]="{ is_cliente: true }"
          p-field-label="nome"
          p-field-value="id"
          p-required>
        </po-lookup>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='venda_cliente_id'; appQuickAdd.open('pessoas')"></po-button>
        </div>
      </div>
      <po-datepicker class="po-md-2" name="data_venda" [(ngModel)]="sellData.data_venda" p-label="Data da Venda" p-required></po-datepicker>
      <po-decimal class="po-md-2" name="valor_venda" [(ngModel)]="sellData.valor_venda" p-label="Valor da Venda" p-decimals="2" p-required></po-decimal>
      <po-number class="po-md-2" name="quilometragem_venda" [(ngModel)]="sellData.quilometragem" p-label="Km na Entrega" p-help="Registrado no histórico de KM do veículo."></po-number>
    </div>

    <div class="po-row po-mt-2">
      <po-radio-group class="po-md-3" name="forma_venda" [(ngModel)]="sellData.forma_venda" p-label="Forma de Recebimento" [p-options]="formaVendaOptions" p-required></po-radio-group>

      <div class="po-md-4" style="display: flex; gap: 8px;">
        <po-lookup
          style="flex: 1"
          name="banco_venda"
          [(ngModel)]="sellData.banco_id"
          [p-label]="sellData.forma_venda === 'Troca' ? 'Conta Bancária (só se houver comissão)' : 'Conta Bancária (Entrada)'"
          [p-filter-service]="bancosLookup"
          p-field-label="nome"
          p-field-value="id"
          [p-required]="sellData.forma_venda === 'Banco'">
        </po-lookup>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='venda_banco_id'; appQuickAdd.open('bancos')"></po-button>
        </div>
      </div>

      <div class="po-md-5" style="display: flex; gap: 8px;">
        <po-lookup
          style="flex: 1"
          name="centro_venda"
          [(ngModel)]="sellData.centro_custo_id"
          p-label="Centro de Custo"
          [p-filter-service]="centrosCustoLookup"
          p-field-label="nome"
          p-field-value="id"
          p-required>
        </po-lookup>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='venda_centro_custo_id'; appQuickAdd.open('centros-custo')"></po-button>
        </div>
      </div>
    </div>

    <div class="po-row po-mt-2">
      <div class="po-md-6" style="display: flex; gap: 8px;">
        <po-lookup
          style="flex: 1"
          name="vendedor_venda"
          [(ngModel)]="sellData.vendedor_id"
          p-label="Vendedor (Opcional — calcula comissão automática)"
          [p-filter-service]="pessoasLookup"
          [p-filter-params]="{ is_vendedor: true }"
          p-field-label="nome"
          p-field-value="id">
        </po-lookup>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='venda_vendedor_id'; appQuickAdd.open('pessoas')"></po-button>
        </div>
      </div>
      <po-input class="po-md-6" name="nota_fiscal_venda_chave" [(ngModel)]="sellData.nota_fiscal_venda_chave" p-label="Chave da NF-e (Venda)" p-maxlength="44" p-help="Exigida pelo RENAVE após o registro da saída de estoque."></po-input>
    </div>

    <ng-container *ngIf="sellData.forma_venda === 'Troca'">
      <po-divider p-label="Veículo Recebido na Troca"></po-divider>

      <div class="po-row">
        <po-select class="po-md-2" name="troca_tipo_veiculo" [(ngModel)]="sellData.troca_tipo_veiculo" p-label="Tipo" [p-options]="tipoVeiculoOptions" p-required></po-select>

        <div class="po-md-3" style="display: flex; gap: 8px;">
          <po-combo style="flex: 1" name="troca_marca_id" [(ngModel)]="sellData.troca_marca_id" p-label="Marca" [p-options]="marcasOptions" (p-change)="updateTrocaModelos()"></po-combo>
          <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
            <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='troca_marca_id'; appQuickAdd.open('marcas')"></po-button>
          </div>
        </div>

        <div class="po-md-3" style="display: flex; gap: 8px;">
          <po-combo style="flex: 1" name="troca_modelo_id" [(ngModel)]="sellData.troca_modelo_id" p-label="Modelo" [p-options]="trocaModelosOptions" [p-disabled]="!sellData.troca_marca_id"></po-combo>
          <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
            <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='troca_modelo_id'; appQuickAdd.open('modelos')" [p-disabled]="!sellData.troca_marca_id"></po-button>
          </div>
        </div>

        <po-input class="po-md-2" name="troca_cor" [(ngModel)]="sellData.troca_cor" p-label="Cor"></po-input>
        <po-input class="po-md-2" name="troca_placa" [(ngModel)]="sellData.troca_placa" p-label="Placa" p-required p-maxlength="7" style="text-transform: uppercase;"></po-input>
      </div>

      <div class="po-row">
        <po-input class="po-md-4" name="troca_chassi" [(ngModel)]="sellData.troca_chassi" p-label="Chassi"></po-input>
        <po-number class="po-md-2" name="troca_ano_fab" [(ngModel)]="sellData.troca_ano_fab" p-label="Ano Fab."></po-number>
        <po-number class="po-md-2" name="troca_ano_mod" [(ngModel)]="sellData.troca_ano_mod" p-label="Ano Mod."></po-number>
        <po-number class="po-md-2" name="troca_quilometragem" [(ngModel)]="sellData.troca_quilometragem" p-label="Km"></po-number>
      </div>

      <div class="po-row">
        <po-decimal class="po-md-3" name="troca_valor_fipe" [(ngModel)]="sellData.troca_valor_fipe" p-label="Valor FIPE" p-decimals="2"></po-decimal>
        <po-decimal class="po-md-3" name="troca_valor" [(ngModel)]="sellData.troca_valor" p-label="Valor de Negociação" p-decimals="2" p-required></po-decimal>
        <po-textarea class="po-md-6" name="troca_observacoes" [(ngModel)]="sellData.troca_observacoes" p-label="Observações"></po-textarea>
      </div>

      <po-info
        class="po-md-12"
        p-label="Diferença (Valor da Venda − Valor de Negociação da Troca)"
        [p-value]="((sellData.valor_venda - sellData.troca_valor) | currency:'BRL') ?? ''"
        p-help="Se positivo, vira Conta a Receber do cliente. Se negativo, vira Conta a Pagar ao cliente. Só é lançado no banco/caixa quando a conta for baixada.">
      </po-info>
    </ng-container>
  </form>
</po-modal>

<!-- Modal de Histórico do Veículo -->
<po-modal #historicoModal
  p-title="Histórico do Veículo"
  p-size="xl"
  [p-primary-action]="{ label: 'Fechar', action: historicoModal.close.bind(historicoModal) }">

  <div class="po-row">
    <po-info class="po-md-4" p-label="Chassi" [p-value]="vehicle.chassi"></po-info>
    <po-info class="po-md-4" p-label="Placa Atual" [p-value]="vehicle.placa"></po-info>
    <po-info class="po-md-4" p-label="Passagens pela Loja" [p-value]="historico.estadias.length"></po-info>
  </div>

  <po-divider p-label="Proprietários"></po-divider>
  <po-table [p-columns]="proprietariosColumns" [p-items]="proprietarios" [p-loading]="buscandoHistorico"></po-table>

  <po-divider p-label="Estadias na Loja (Compras/Vendas)"></po-divider>
  <po-table [p-columns]="estadiasColumns" [p-items]="historico.estadias" [p-loading]="buscandoHistorico"></po-table>

  <po-divider p-label="Histórico de Quilometragem"></po-divider>
  <po-table [p-columns]="kmHistoricoColumns" [p-items]="historico.km_historico" [p-loading]="buscandoHistorico"></po-table>

  <po-divider p-label="Cautelares / Vistorias"></po-divider>
  <div class="po-row po-mb-1">
    <po-button class="po-md-3" p-label="Nova Cautelar" p-kind="primary" p-icon="an an-plus" (p-click)="openNovaCautelar()"></po-button>
  </div>
  <po-table [p-columns]="cautelaresColumns" [p-items]="historico.cautelares" [p-actions]="cautelaresTableActions" [p-loading]="buscandoHistorico"></po-table>
</po-modal>

<!-- Modal de Nova Cautelar -->
<po-modal #cautelarModal
  p-title="Nova Cautelar / Vistoria"
  p-size="lg"
  [p-primary-action]="{ label: 'Salvar', action: saveCautelar.bind(this), loading: isLoadingSaveCautelar }"
  [p-secondary-action]="{ label: 'Cancelar', action: cautelarModal.close.bind(cautelarModal) }">

  <form #cautelarForm="ngForm">
    <div class="po-row">
      <po-input class="po-md-5" name="empresa_realizadora" [(ngModel)]="cautelar.empresa_realizadora" p-label="Empresa Realizadora" p-required></po-input>
      <po-datepicker class="po-md-3" name="data_cautelar" [(ngModel)]="cautelar.data" p-label="Data" p-required></po-datepicker>
      <po-select class="po-md-4" name="resultado" [(ngModel)]="cautelar.resultado" p-label="Resultado" [p-options]="resultadoCautelarOptions" p-required></po-select>
    </div>

    <div class="po-row">
      <po-upload
        class="po-md-12"
        name="laudo_file"
        p-label="Anexar Laudo (PDF ou imagem)"
        p-url="/api/cautelares/upload-laudo"
        [p-headers]="uploadHeaders"
        [p-restrictions]="laudoRestrictions"
        (p-success)="onLaudoUploadSuccess($event)">
      </po-upload>
    </div>

    <po-divider p-label="Custo (opcional)"></po-divider>
    <div class="po-row">
      <po-decimal class="po-md-3" name="custo" [(ngModel)]="cautelar.custo" p-label="Custo" p-decimals="2"></po-decimal>
      <div class="po-md-4" style="display: flex; gap: 8px;">
        <po-lookup
          style="flex: 1"
          name="cautelar_banco_id"
          [(ngModel)]="cautelar.banco_id"
          p-label="Banco/Conta (se houver custo)"
          [p-filter-service]="bancosLookup"
          p-field-label="nome"
          p-field-value="id">
        </po-lookup>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='cautelar_banco_id'; appQuickAdd.open('bancos')"></po-button>
        </div>
      </div>
      <div class="po-md-5" style="display: flex; gap: 8px;">
        <po-lookup
          style="flex: 1"
          name="cautelar_centro_custo_id"
          [(ngModel)]="cautelar.centro_custo_id"
          p-label="Centro de Custo (se houver custo)"
          [p-filter-service]="centrosCustoLookup"
          p-field-label="nome"
          p-field-value="id">
        </po-lookup>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='cautelar_centro_custo_id'; appQuickAdd.open('centros-custo')"></po-button>
        </div>
      </div>
    </div>

    <div class="po-row">
      <po-textarea class="po-md-12" name="observacoes_cautelar" [(ngModel)]="cautelar.observacoes" p-label="Observações"></po-textarea>
    </div>
  </form>
</po-modal>
<app-quick-add #appQuickAdd (onAdded)="handleQuickAdd($event, currentQuickAddField)"></app-quick-add>
