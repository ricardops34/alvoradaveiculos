<po-page-list 
  p-title="Gestão de Usuários" 
  [p-actions]="actions"
  [p-filter]="filterSettings">

  <po-table 
    class="po-mt-1 po-mb-5"
    p-sort="true"
    [p-columns]="columns" 
    [p-items]="users" 
    [p-actions]="tableActions"
    [p-show-more-disabled]="!hasNext"
    (p-show-more)="showMore()"
    [p-loading]="isLoading">
  </po-table>
</po-page-list>

<po-modal #userModal 
  [p-title]="isEditing ? 'Editar Usuário' : 'Novo Usuário'"
  p-size="md"
  [p-primary-action]="{ label: 'Salvar', action: save.bind(this), loading: isLoadingSave }"
  [p-secondary-action]="{ label: 'Cancelar', action: userModal.close.bind(userModal) }">
  
  <form #userForm="ngForm">
    <div class="po-row">
      <po-input class="po-md-6" name="nome" [(ngModel)]="user.nome" p-label="Nome Completo" p-required></po-input>
      <po-input class="po-md-6" name="email" [(ngModel)]="user.email" p-label="E-mail / Login" p-required></po-input>
    </div>

    <div class="po-row">
      <po-password class="po-md-6" name="senha" [(ngModel)]="user.senha" p-label="Senha" p-required></po-password>
      <po-lookup 
        class="po-md-6" 
        name="perfil_id" 
        [(ngModel)]="user.perfil_id" 
        p-label="Perfil de Acesso" 
        [p-filter-service]="perfisLookup" 
        p-field-label="nome"
        p-field-value="id"
        p-required>
      </po-lookup>
    </div>

    <div class="po-row">
      <po-divider class="po-md-12" p-label="Informações do Perfil"></po-divider>
      <p class="po-md-12 po-text-color-08">As permissões deste usuário são definidas pelo Perfil de Acesso selecionado acima. Para alterar as telas permitidas, vá no menu "Perfis de Acesso".</p>
    </div>
  </form>
</po-modal>
