<po-page-list 
  p-title="Movimentação Financeira" 
  [p-actions]="actions"
  [p-filter]="filterSettings">

  <po-table 
    class="po-mt-1"
    p-sort="true"
    [p-columns]="columns" 
    [p-items]="movements" 
    [p-actions]="tableActions">
  </po-table>

</po-page-list>

<po-modal #movementModal 
  [p-title]="isEditing ? 'Editar Lançamento' : 'Novo Lançamento'"
  [p-primary-action]="{ label: 'Salvar', action: save.bind(this) }"
  [p-secondary-action]="{ label: 'Cancelar', action: movementModal.close.bind(movementModal) }">

  <form #movementForm="ngForm">
    <div class="po-row">
      <po-datepicker class="po-md-4" name="data" [(ngModel)]="movement.data" p-label="Data" p-required></po-datepicker>
      <div class="po-md-4" style="display: flex; gap: 8px;">
        <po-lookup 
          style="flex: 1" 
          name="banco" 
          [(ngModel)]="movement.banco_id" 
          p-label="Banco" 
          [p-filter-service]="bancosLookup" 
          p-field-label="nome"
          p-field-value="id"
          p-required>
        </po-lookup>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='banco_id'; appQuickAdd.open('bancos')"></po-button>
        </div>
      </div>
      <po-select class="po-md-4" name="tipo" [(ngModel)]="movement.tipo" p-label="Tipo" [p-options]="typeOptions" p-required></po-select>
    </div>

    <div class="po-row">
      <po-input class="po-md-8" name="historico" [(ngModel)]="movement.historico" p-label="Histórico" p-required></po-input>
      <po-decimal class="po-md-4" name="valor" [(ngModel)]="movement.valor" p-label="Valor" p-decimals="2" p-required></po-decimal>
    </div>

    <div class="po-row">
      <div class="po-md-6" style="display: flex; gap: 8px;">
        <po-lookup 
          style="flex: 1" 
          name="centro_custo" 
          [(ngModel)]="movement.centro_custo_id" 
          p-label="Centro de Custo" 
          [p-filter-service]="centrosCustoLookup" 
          p-field-label="nome"
          p-field-value="id"
          p-required>
        </po-lookup>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='centro_custo_id'; appQuickAdd.open('centros-custo')"></po-button>
        </div>
      </div>
    </div>

    <po-divider p-label="Vínculos e Atalhos"></po-divider>

    <div class="po-row">
      <div class="po-md-6" style="display: flex; gap: 8px;">
        <po-lookup 
          style="flex: 1" 
          name="pessoa" 
          [(ngModel)]="movement.pessoa_id" 
          p-label="Pessoa (Opcional)" 
          [p-filter-service]="pessoasLookup" 
          p-field-label="nome"
          p-field-value="id">
        </po-lookup>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='pessoa_id'; appQuickAdd.open('pessoas')"></po-button>
        </div>
      </div>
      <div class="po-md-6" style="display: flex; gap: 8px;">
        <po-lookup 
          style="flex: 1" 
          name="veiculo" 
          [(ngModel)]="movement.veiculo_id" 
          p-label="Veículo (Opcional)" 
          [p-filter-service]="veiculosLookup" 
          p-field-label="placa"
          p-field-value="id">
        </po-lookup>
        <div style="display: flex; align-items: flex-end; padding-bottom: 8px;">
          <po-button p-kind="primary" p-icon="an an-plus" (p-click)="currentQuickAddField='veiculo_id'; appQuickAdd.open('veiculos')"></po-button>
        </div>
      </div>
    </div>
  </form>
</po-modal>

<app-quick-add #appQuickAdd (onAdded)="handleQuickAdd($event, currentQuickAddField)"></app-quick-add>
