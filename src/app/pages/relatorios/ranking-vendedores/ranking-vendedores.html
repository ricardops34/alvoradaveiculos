<po-page-default p-title="Ranking de Vendedores">

  <po-container>
    <div class="po-row">
      <po-datepicker class="po-md-3" name="inicio" [(ngModel)]="filter.data_inicio" p-label="Data Início" (p-change)="search()"></po-datepicker>
      <po-datepicker class="po-md-3" name="fim" [(ngModel)]="filter.data_fim" p-label="Data Fim" (p-change)="search()"></po-datepicker>
      <div class="po-md-4 po-mt-4 po-p-0 po-row">
        <po-button class="po-md-6" p-icon="an an-file-xls" (p-click)="exportXLS()" p-tooltip="Excel"></po-button>
        <po-button class="po-md-6" p-icon="an an-file-pdf" (p-click)="exportPDF()" p-tooltip="PDF"></po-button>
      </div>
    </div>
  </po-container>

  <div class="po-row po-mt-2">
    <po-widget class="po-md-4" p-title="Total de Vendas">
      <div class="po-font-subtitle po-text-center po-py-2" style="font-size: 28px;">
        {{ totalVendas }}
      </div>
      <div class="po-text-center po-text-color-08">veículos vendidos no período</div>
    </po-widget>

    <po-widget class="po-md-4" p-title="Valor Total Vendido">
      <div class="po-font-subtitle po-text-center po-py-2" style="font-size: 24px; color: #2e7d32;">
        {{ totalVendido | currency:'BRL' }}
      </div>
    </po-widget>

    <po-widget class="po-md-4" p-title="Total de Comissões">
      <div class="po-font-subtitle po-text-center po-py-2" style="font-size: 24px; color: #f44336;">
        {{ totalComissoes | currency:'BRL' }}
      </div>
    </po-widget>
  </div>

  <div class="po-row po-mt-2">
    <po-chart
      class="po-md-12"
      p-title="Valor Vendido por Vendedor"
      [p-series]="chartSeries"
      p-type="bar">
    </po-chart>
  </div>

  <po-divider p-label="Detalhamento por Vendedor"></po-divider>

  <po-table
    [p-columns]="columns"
    [p-items]="ranking">
  </po-table>

</po-page-default>
