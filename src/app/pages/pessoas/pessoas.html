<po-page-list 
  p-title="Cadastro de Pessoas" 
  [p-actions]="actions"
  [p-filter]="filterSettings"
  [p-disclaimer-group]="disclaimerGroup">

  <po-table 
    class="po-mt-1 po-mb-5"
    p-sort="true"
    [p-columns]="columns" 
    [p-items]="people" 
    [p-actions]="tableActions"
    [p-show-more-disabled]="!hasNext"
    [p-loading-show-more]="loadingShowMore"
    [p-loading]="isLoading"
    (p-show-more)="showMore()">
  </po-table>

</po-page-list>

<po-modal #personModal 
  [p-title]="isEditing ? 'Editar Pessoa' : 'Nova Pessoa'"
  p-size="xl"
  [p-primary-action]="{ label: 'Salvar', action: save.bind(this), loading: isLoadingSave }"
  [p-secondary-action]="{ label: 'Cancelar', action: personModal.close.bind(personModal) }">

  <form #personForm="ngForm">
    <div class="po-row">
      <po-input class="po-md-6" name="nome" [(ngModel)]="person.nome" p-label="Nome Completo / Razão Social" p-required></po-input>
      <po-select class="po-md-3" name="tipo_pessoa" [(ngModel)]="person.tipo_pessoa" p-label="Tipo" [p-options]="typeOptions" p-required></po-select>
      <po-input class="po-md-3" name="documento" [(ngModel)]="person.documento" p-label="CPF / CNPJ" [p-mask]="documentMask" p-required></po-input>
    </div>

    <div class="po-row">
      <po-checkbox-group 
        class="po-md-12" 
        name="roles" 
        [(ngModel)]="roles" 
        p-label="Papéis da Pessoa (Selecione todos que se aplicam)" 
        [p-options]="roleOptions">
      </po-checkbox-group>
    </div>

    <po-divider p-label="Contato e Endereço"></po-divider>

    <div class="po-row">
      <po-input class="po-md-4" name="email" [(ngModel)]="person.email" p-label="E-mail" p-icon="po-icon-mail"></po-input>
      <po-input class="po-md-4" name="telefone" [(ngModel)]="person.telefone" p-label="Telefone" p-mask="(99) 99999-9999"></po-input>
      <po-input class="po-md-4" name="cep" [(ngModel)]="person.cep" p-label="CEP" p-mask="99999-999"></po-input>
    </div>

    <div class="po-row">
      <po-input class="po-md-6" name="endereco" [(ngModel)]="person.endereco" p-label="Endereço"></po-input>
      <po-input class="po-md-2" name="numero" [(ngModel)]="person.numero" p-label="Número"></po-input>
      <po-input class="po-md-4" name="cidade" [(ngModel)]="person.cidade" p-label="Cidade"></po-input>
    </div>
  </form>
</po-modal>

<po-modal #advancedFilterModal p-title="Busca avançada" [p-primary-action]="{ label: 'Aplicar filtros', action: applyFilters.bind(this) }">
  <div class="po-row">
    <po-checkbox-group
      class="po-md-12"
      name="tipo_pessoa_filter"
      p-label="Filtrar por Tipo de Pessoa"
      p-columns="2"
      [p-options]="typeOptions"
      [(ngModel)]="selectedTipos">
    </po-checkbox-group>
  </div>
  <div class="po-row po-mt-2">
    <po-checkbox-group
      class="po-md-12"
      name="papel_filter"
      p-label="Filtrar por Papel"
      p-columns="2"
      [p-options]="roleOptions"
      [(ngModel)]="selectedPapeis">
    </po-checkbox-group>
  </div>
</po-modal>
