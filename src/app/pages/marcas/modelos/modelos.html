<po-modal #modeloModal 
  [p-title]="modelo.id ? 'Editar Modelo' : 'Novo Modelo'"
  [p-primary-action]="{ label: 'Salvar', action: save.bind(this), loading: isLoadingSave }"
  [p-secondary-action]="{ label: 'Cancelar', action: modeloModal.close.bind(modeloModal) }">
  
  <div class="po-row">
    <po-input 
      class="po-md-12" 
      name="nome" 
      [(ngModel)]="modelo.nome" 
      p-label="Nome do Modelo" 
      p-required>
    </po-input>
    
    <po-number 
      class="po-md-6" 
      name="ano_inicial" 
      [(ngModel)]="modelo.ano_inicial" 
      p-label="Ano Inicial">
    </po-number>
    
    <po-number 
      class="po-md-6" 
      name="ano_final" 
      [(ngModel)]="modelo.ano_final" 
      p-label="Ano Final">
    </po-number>

    <po-textarea 
      class="po-md-12" 
      name="descricao" 
      [(ngModel)]="modelo.descricao_detalhada" 
      p-label="Descrição Detalhada">
    </po-textarea>
  </div>
</po-modal>
