<po-page-list 
  p-title="Contas Bancárias" 
  [p-actions]="actions"
  [p-filter]="filterSettings">

  <po-table 
    class="po-mt-1 po-mb-5"
    p-sort="true"
    [p-columns]="columns" 
    [p-items]="banks" 
    [p-actions]="tableActions"
    [p-show-more-disabled]="!hasNext"
    [p-loading-show-more]="loadingShowMore"
    [p-loading]="isLoading"
    (p-show-more)="showMore()">
  </po-table>
</po-page-list>

<po-modal #bankModal 
  [p-title]="isEditing ? 'Editar Conta' : 'Nova Conta'"
  p-size="md"
  [p-primary-action]="{ label: 'Salvar', action: save.bind(this), loading: isLoadingSave }"
  [p-secondary-action]="{ label: 'Cancelar', action: bankModal.close.bind(bankModal) }">
  
  <form #bankForm="ngForm">
    <div class="po-row">
      <po-input class="po-md-4" name="codigo" [(ngModel)]="bank.codigo" p-label="Código" p-required></po-input>
      <po-input class="po-md-8" name="nome" [(ngModel)]="bank.nome" p-label="Nome do Banco" p-required></po-input>
    </div>

    <div class="po-row">
      <po-input class="po-md-6" name="agencia" [(ngModel)]="bank.agencia" p-label="Agência" p-required></po-input>
      <po-input class="po-md-6" name="conta" [(ngModel)]="bank.conta" p-label="Conta" p-required></po-input>
    </div>

    <div class="po-row">
      <po-select class="po-md-4" name="tipo" [(ngModel)]="bank.tipo" p-label="Tipo de Conta" [p-options]="typeOptions"></po-select>
      <po-decimal class="po-md-4" name="saldo_inicial" [(ngModel)]="bank.saldo_inicial" p-label="Saldo Inicial" p-decimals="2" p-help="Saldo de abertura da conta"></po-decimal>
      <po-decimal class="po-md-4" name="limite_credito" [(ngModel)]="bank.limite_credito" p-label="Limite de Crédito" p-decimals="2" p-help="Valor do cheque especial/limite"></po-decimal>
    </div>
  </form>
</po-modal>
