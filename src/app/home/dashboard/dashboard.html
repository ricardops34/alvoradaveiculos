<po-page-default p-title="Dashboard Financeiro">

  <div class="po-row">
    <po-widget class="po-md-3" p-title="Total em Estoque">
      <div class="po-font-subtitle po-text-center po-py-2" style="font-size: 24px;">
        {{ totalStockValue | currency:'BRL' }}
      </div>
      <div class="po-text-center po-text-color-08">{{ vehiclesCount }} veículos</div>
    </po-widget>

    <po-widget class="po-md-3" p-title="Saldo em Bancos">
      <div class="po-font-subtitle po-text-center po-py-2" style="font-size: 24px;" 
        [style.color]="totalBankBalance >= 0 ? 'green' : 'red'">
        {{ totalBankBalance | currency:'BRL' }}
      </div>
      <div class="po-text-center po-text-color-08">Soma de todas as contas</div>
    </po-widget>

    <po-widget class="po-md-3" p-title="Vendas Realizadas">
      <div class="po-font-subtitle po-text-center po-py-2" style="font-size: 24px; color: #00b0ff;">
        {{ soldVehiclesCount }}
      </div>
      <div class="po-text-center po-text-color-08">Veículos entregues</div>
    </po-widget>

    <po-widget class="po-md-3" p-title="Data Atual">
      <div class="po-font-subtitle po-text-center po-py-2" style="font-size: 18px;">
        {{ today | date:'dd/MM/yyyy' }}
      </div>
      <div class="po-text-center po-text-color-08">Status do sistema: OK</div>
    </po-widget>
  </div>

  <div class="po-row po-mt-2">
    <po-chart class="po-md-6" 
      p-title="Receitas vs Despesas (Mês Atual)" 
      [p-series]="revenueVsExpenses"
      p-type="bar">
    </po-chart>

    <po-chart class="po-md-6" 
      p-title="Distribuição de Estoque" 
      [p-series]="vehiclesByStatus"
      p-type="donut">
    </po-chart>
  </div>

</po-page-default>
