<main
  class="login-page"
  [style.--login-background]="'url(\'fachada-alvorada-login-v2.png\')'"
>
  <section class="access-panel">
    <div class="login-card">
      <div class="logo-section">
        <div class="logo-frame">
          <img src="logo-alvorada-horizontal.png" alt="Alvorada Veículos" class="logo-img">
        </div>
      </div>

      <div class="welcome-copy">
        <h3></h3>
        <p>Entre com seus dados para acessar o sistema.</p>
      </div>

      <form #formLogin="ngForm" class="login-form" (ngSubmit)="onLogin(formLogin)">
        <div class="form-field">
          <po-email
            name="login"
            [(ngModel)]="email"
            p-clean
            p-error-pattern="E-mail inválido"
            p-label="E-mail"
            p-placeholder="Informe seu e-mail"
            p-required>
          </po-email>
        </div>

        <div class="form-field">
          <po-password
            name="password"
            [(ngModel)]="password"
            p-label="Senha"
            p-placeholder="Informe sua senha"
            p-required="true">
          </po-password>
        </div>

        <div class="login-options">
          <po-checkbox name="remember" [(ngModel)]="rememberMe" p-label="Lembrar-me">
          </po-checkbox>
          <button type="button" (click)="forgotPassword()" class="forgot-link">
            Esqueci minha senha
          </button>
        </div>

        <po-button
          class="submit-button"
          p-label="Entrar no sistema"
          p-kind="primary"
          p-type="submit"
          [p-loading]="loading">
        </po-button>
      </form>

      <footer class="login-footer">
        <span aria-hidden="true" class="lock-icon">●</span>
        Ambiente seguro e protegido
      </footer>
    </div>
  </section>
</main>
