<div class="login-page">
  <div class="login-card">
    <div class="logo-section">
      <img src="/favicon.png" alt="Alvorada Veículos" class="logo-img">
      <h1 class="title">Alvorada Veículos</h1>
    </div>

    <form #formLogin="ngForm" class="login-form">
      <div class="form-field">
        <po-input
          name="login"
          [(ngModel)]="email"
          p-label="E-mail"
          p-placeholder="seu@email.com"
          p-required="true">
        </po-input>
      </div>

      <div class="form-field">
        <po-input
          name="password"
          [(ngModel)]="password"
          p-label="Senha"
          p-placeholder="••••••••"
          p-required="true"
          (keyup.enter)="onLogin(formLogin)">
        </po-input>
      </div>

      <div class="form-field remember-field">
        <po-checkbox
          name="remember"
          [(ngModel)]="rememberMe"
          p-label="Lembrar-me">
        </po-checkbox>
      </div>

      <div class="form-field">
        <po-button
          p-label="Entrar"
          p-kind="primary"
          [p-loading]="loading"
          (p-click)="onLogin(formLogin)">
        </po-button>
      </div>
    </form>

    <div class="forgot-section">
      <a href="#" class="forgot-link">Esqueci minha senha</a>
    </div>
  </div>
</div>
