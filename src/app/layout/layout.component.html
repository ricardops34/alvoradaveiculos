<div class="po-wrapper">
  <po-toolbar p-title="Alvorada Veículos" p-logo="favicon.png" [p-profile]="profile" [p-profile-actions]="profileActions">
  </po-toolbar>

  <!-- Toggle de tema direto na toolbar (sol/lua) -->
  <button class="theme-toggle-btn" 
    (click)="toggleTheme()" 
    [attr.title]="isDarkMode ? 'Modo Claro' : 'Modo Escuro'"
    [attr.aria-label]="isDarkMode ? 'Ativar modo claro' : 'Ativar modo escuro'">
    <span class="theme-icon" [class]="isDarkMode ? 'an an-sun' : 'an an-moon'"></span>
  </button>

  <po-menu [p-collapsed]="true" p-filter [p-menus]="menus" [p-automatic-toggle]="true"></po-menu>

  <router-outlet></router-outlet>
</div>
