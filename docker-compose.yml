version: '3.8'

services:
  alvorada-api:
    image: bjsoftware/alvorada-api:latest
    container_name: alvorada-api
    restart: always
    environment:
      DATABASE_URL: postgresql://alvorada:alvorada202@postgres:5432/alvorada-db
      #postgresql://postgres:Senha%401245@postgres:5432/evolution
      PORT: "3000"
    networks:
      - network_db
      - network_public

  alvorada-crm:
    image: bjsoftware/alvorada-crm:latest
    container_name: alvorada-crm-app
    restart: always
    depends_on:
      - alvorada-api
    networks:
      - network_db
      - network_public
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=network_public"
        - "traefik.http.routers.alvorada-crm.rule=Host(`alvorada.bjsoft.com.br`)"
        - "traefik.http.routers.alvorada-crm.entrypoints=websecure"
        - "traefik.http.routers.alvorada-crm.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.alvorada-crm.loadbalancer.server.port=80"

networks:
  network_db:
    external: true
  network_public:
    external: true
