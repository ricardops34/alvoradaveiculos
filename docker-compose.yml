version: '3.8'

services:
  alvorada-db:
    image: postgres:16-alpine
    container_name: alvorada-db
    restart: always
    volumes:
      - alvorada_pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: alvorada
      POSTGRES_PASSWORD: alvorada2026
      POSTGRES_DB: alvorada_db
    networks:
      - alvorada_internal

  alvorada-api:
    image: bjsoftware/alvorada-api:latest
    container_name: alvorada-api
    restart: always
    environment:
      DATABASE_URL: postgres://alvorada:alvorada2026@alvorada-db:5432/alvorada_db
      PORT: "3000"
    depends_on:
      - alvorada-db
    networks:
      - alvorada_internal
      - network_public

  alvorada-crm:
    image: bjsoftware/alvorada-crm:latest
    container_name: alvorada-crm-app
    restart: always
    depends_on:
      - alvorada-api
    networks:
      - alvorada_internal
      - network_public
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=network_public"
        - "traefik.http.routers.alvorada-crm.rule=Host(`alvoradabd.bjsoft.com.br`)"
        - "traefik.http.routers.alvorada-crm.entrypoints=websecure"
        - "traefik.http.routers.alvorada-crm.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.alvorada-crm.loadbalancer.server.port=80"

volumes:
  alvorada_pgdata:

networks:
  alvorada_internal:
  network_public:
    external: true
