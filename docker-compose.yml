services:
  alvorada-api:
    image: bjsoftware/alvorada-api:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - alvorada_uploads:/app/uploads
      - alvorada_private:/app/private
      - alvorada_backups:/app/backups
    networks:
      - network_db
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      update_config:
        order: start-first
        failure_action: rollback

  alvorada-crm:
    image: bjsoftware/alvorada-crm:${IMAGE_TAG:-latest}
    networks:
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first
        failure_action: rollback
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public
        - traefik.swarm.network=network_public
        - traefik.http.routers.alvorada-crm.rule=Host(`${HOST_URL}`)
        - traefik.http.routers.alvorada-crm.entrypoints=websecure
        - traefik.http.routers.alvorada-crm.tls=true
        - traefik.http.routers.alvorada-crm.tls.certresolver=letsencryptresolver
        - traefik.http.services.alvorada-crm.loadbalancer.server.port=80

volumes:
  alvorada_uploads:
  alvorada_private:
  alvorada_backups:

networks:
  network_db:
    external: true
  network_public:
    external: true
